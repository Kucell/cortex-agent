## Phase 1 Success Criteria
success_criteria:
  first_pass_rate: "> 0.85"  # First-pass rate > 85%
  retry_count_zero: true  # Zero infinite loops (max_retry hard block)
  cost_increase_limit: "< 1.0"  # Cost increase < 100%
  hook_block_rate: "> 0.9"  # Hook intercept rate > 90%

## Phase 2 Decision Matrix
phase2_triggers:
  context_budget_control:
    condition: "overflow_count / total_tasks > 0.1"
    description: "Overflow rate > 10% → Implement heuristic context budget control"

  entropy_governance:
    condition: "(stale_refs + missing_refs + rule_drift) / total_refs > 0.2"
    description: "Knowledge base health < 80 → Implement entropy governance L0+L1"

## Data Collection Instructions

### Manual Tracking (2 weeks)

1. **Context Overflow**:
   - After each task, check context window usage
   - If > 80%, record as overflow
   - Formula: `overflow_rate = overflow_count / total_tasks`

2. **First Pass Rate**:
   - Reviewer returns "✅ Passed + no ❌ Must Fix" on first try → count as pass
   - Otherwise count as needs retry
   - Formula: `first_pass_rate = pass_count / total_tasks`

3. **Knowledge Base Health**:
   - Check `.agent/references/` directory weekly
   - Compare with actual code, mark stale/missing/drifted references
   - Formula: `health = 1 - (problem_refs / total_refs)`

4. **Cost**:
   - Record token usage per task (from API logs)
   - Calculate cost based on Claude API pricing

### Automated Collection (Optional)

If API log access available, write script for auto-collection:
```bash
# Example: Extract token usage from API logs
.agent/metrics/collect.sh --start-date 2026-03-25 --weeks 2
```

## Review & Decision

After 2 weeks (around 2026-04-08), review collected data:
1. Check if Phase 1 success criteria are met
2. Decide Phase 2 implementation based on trigger conditions
3. Update this file with actual values and decision results
