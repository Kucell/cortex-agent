  retry_count_max: 0  # Maximum retry count

  # Blocking issues
  blocking_issues_per_task: null  # Average "❌ Must Fix" count per task

  # Trigger condition: first_pass_rate < 70% → Strengthen reasoning sandwich or adjust reviewer

