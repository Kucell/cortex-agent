# Baseline Metrics Collection
# Phase 1: Collect baseline data to evaluate optimization effects and decide Phase 2 implementation

## Collection Period
start_date: null  # Auto-filled with creation date
collection_weeks: 2  # Collect 2 weeks of data before evaluation

## Context Window Metrics
context:
  # Context window utilization
  window_utilization_avg: null  # Average utilization (percentage)
  window_utilization_p95: null  # P95 utilization (detect peaks)
  overflow_count: 0  # Overflow count (> 80% context window considered overflow)

  # Trigger condition: overflow_count / total_tasks > 10% → Implement context budget control

## Quality Metrics
